<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chiang Mai Trip Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase SDK (compat version) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 15px;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background: #4e83d8;
      color: white;
      border: none;
      border-radius: 10px;
    }

    button:active {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>Chiang Mai Trip Planner</h1>

  <textarea id="content" placeholder="Write your plan here..."></textarea>

  <button onclick="saveData()">Save to Cloud</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDVhhl0eGYZFBa8DluJVTSSAHBik51ie4M",
      authDomain: "chiangmaitrip-2a461.firebaseapp.com",
      projectId: "chiangmaitrip-2a461",
      storageBucket: "chiangmaitrip-2a461.firebasestorage.app",
      messagingSenderId: "739453458567",
      appId: "1:739453458567:web:f91ef60b3421d643a4c022"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function saveData() {
      const text = document.getElementById("content").value;

      if (!text.trim()) {
        alert("Please enter something first.");
        return;
      }

      db.collection("itineraries").add({
        content: text,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
        alert("✅ Saved successfully!");
        document.getElementById("content").value = "";
      })
      .catch((error) => {
        alert("❌ Error: " + error.message);
      });
    }
  </script>

</body>
</html>
