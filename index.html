<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chiang Mai Trip Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #2d89ef;
      color: white;
      border: none;
      border-radius: 6px;
    }

    .status {
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1>Chiang Mai Trip Planner</h1>

  <textarea id="content" placeholder="Write your plan here..."></textarea>

  <button onclick="saveData()">Save to Cloud</button>

  <div class="status" id="status"></div>

  <script>
    // 🔥 替換成你自己 Firebase 設定
    cconst firebaseConfig = {
  apiKey: "AIzaSyDVhhl0eGYZFBa8DluJVTSSAHBik51ie4M",
  authDomain: "chiangmaitrip-2a461.firebaseapp.com",
  projectId: "chiangmaitrip-2a461",
  storageBucket: "chiangmaitrip-2a461.firebasestorage.app",
  messagingSenderId: "739453458567",
  appId: "1:739453458567:web:f91ef60b3421d643a4c022"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function saveData() {
      const text = document.getElementById("content").value;

      db.collection("itineraries").add({
        content: text,
        createdAt: new Date()
      }).then(() => {
        document.getElementById("status").innerText = "✅ Saved successfully!";
      }).catch((error) => {
        document.getElementById("status").innerText = "❌ Error: " + error;
      });
    }
  </script>

</body>
</html>
